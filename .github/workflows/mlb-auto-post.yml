# .github/workflows/mlb-auto-post.yml
#
# MLB 경기 결과를 매일 자동으로 GitHub Pages 블로그에 포스팅합니다.
#
# 필수 설정:
#   Repository Settings → Actions → General → Workflow permissions
#   → "Read and write permissions" 체크 필요
#
# 선택 설정 (커밋 이름 커스텀):
#   Settings → Secrets and variables → Actions → Variables
#   GIT_USER_NAME, GIT_USER_EMAIL 추가

name: MLB 경기 결과 자동 포스팅

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:
    inputs:
      target_date:
        description: "날짜 지정 (YYYY-MM-DD, 비워두면 어제)"
        required: false
        default: ""

jobs:
  post-mlb-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 의존성 설치
        run: pip install requests

      - name: ⚾ MLB 경기 결과 수집 및 포스트 생성
        id: mlb
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            python mlb_fetch.py --date "${{ github.event.inputs.target_date }}"
          else
            python mlb_fetch.py
          fi

      - name: 🔍 변경 사항 확인
        id: check_changes
        run: |
          git add _posts/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 새 포스트 없음 (이미 최신 상태)"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ 새 포스트 감지됨"
          fi

      - name: 💾 포스트 커밋 & 푸시
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "${{ vars.GIT_USER_NAME  || 'MLB-Bot' }}"
          git config user.email "${{ vars.GIT_USER_EMAIL || 'mlb-bot@github-actions.local' }}"
          git commit -m "⚾ MLB 경기 결과 | ${{ steps.mlb.outputs.post_date }} (${{ steps.mlb.outputs.game_count }}경기)"
          git push

      - name: 📋 실행 요약
        run: |
          echo "### ⚾ MLB 자동 포스팅 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 날짜 | ${{ steps.mlb.outputs.post_date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 경기 수 | ${{ steps.mlb.outputs.game_count }}개 |" >> $GITHUB_STEP_SUMMARY
          echo "| 변경 여부 | ${{ steps.check_changes.outputs.changed }} |" >> $GITHUB_STEP_SUMMARY
