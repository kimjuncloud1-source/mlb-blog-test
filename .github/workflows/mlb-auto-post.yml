name: MLB 경기 결과 자동 포스팅

on:
  schedule:
    - cron: "30 23 * * *" # KST 기준 오전 8시 30분
  workflow_dispatch:
    inputs:
      target_date:
        description: "날짜 지정 (YYYY-MM-DD, 비워두면 어제)"
        required: false
        default: ""

jobs:
  post-mlb-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 의존성 설치
        run: pip install requests

      - name: ⚾ MLB 경기 결과 수집 및 포스트 생성
        id: mlb
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            python mlb_fetch.py --date "${{ github.event.inputs.target_date }}"
          else
            python mlb_fetch.py
          fi

      - name: 🔍 변경 사항 확인 및 푸시
        run: |
          git config user.name  "MLB-Bot"
          git config user.email "mlb-bot@github-actions.local"
          git add _posts/
          
          if ! git diff --staged --quiet; then
            git commit -m "⚾ MLB 경기 결과 업데이트"
            git pull --rebase origin main # <--- 핵심: 준님이 수정한 파일들과 자동화 파일을 합쳐줍니다!
            git push
            echo "✅ 성공적으로 올라갔습니다!"
          else
            echo "ℹ️ 새로 올릴 내용이 없습니다."
          fi
